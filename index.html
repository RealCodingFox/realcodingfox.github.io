<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="images/me.png">
    <title>CodingFox's Website</title>
    <link href="/styles.css" rel="stylesheet" />
    <style>
        body {
            background-color: #1e1e2e;
        }
    </style>
</head>
<body>
    <div class="liquid-box-static top-bar" style="margin-left: auto; margin-right: auto; margin-top: 0.5rem; padding: 0">
        <div class="navbar-item" onclick="loadPage('page-internals/home.html', this)">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"> <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            <span>Home</span>
        </div>
        <div class="navbar-item" onclick="loadPage('page-internals/projects.html', this)">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-folder-icon lucide-folder"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
            <span>Projects</span>
        </div>
        <div class="navbar-item" onclick="loadPage('page-internals/about.html', this)">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-info-icon lucide-info"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
            <span>About</span>
        </div>
    </div>
    <div class="center-wrapper">
        <div id="content-area">
            <!-- Load the page will be injected here to be displayed and changed -->
        </div>
    </div>
    <script>
        async function loadPage(pageUrl, clickedElement) {
            try {
                // Locate the internal and fetch to inject it in the html.
                const response = await fetch(pageUrl);
                const html = await response.text();
                const container = document.getElementById('content-area');
                container.innerHTML = html;

                // Controlling towards the button's state
                if (clickedElement) {
                    // Snatch active attribute from everybody.
                    document.querySelectorAll('.navbar-item').forEach(item => {
                        item.removeAttribute('active');
                    });

                    // Grant the attribute active to the chosen one.
                    clickedElement.setAttribute('active', '');
                }
            } catch (error) {
                console.error('Error loading the page:', error);
            }
        }

        // In the beginning, the home page was loaded as the default.
        window.onload = () => {
            const defaultNav = document.querySelectorAll('.navbar-item')[2];
            loadPage("page-internals/about.html", defaultNav);
        };
    </script>
</body>
